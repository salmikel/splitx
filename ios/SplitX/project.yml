name: SplitX
options:
  bundleIdPrefix: com.splitx
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"

targets:
  SplitX:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SplitX
        excludes:
          - "**/*.md"
    settings:
      base:
        INFOPLIST_FILE: SplitX/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.splitx.app
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Supabase
        product: Supabase

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
